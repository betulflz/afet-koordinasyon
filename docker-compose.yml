version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: afet_yonetim_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AfetYonetim123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data: